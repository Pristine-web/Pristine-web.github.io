<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<div class="logo-container">
    <img src="logo.png" alt="Company Logo" class="logo">
</div>
<title>Water Softener Calculator</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg, #0c1e49, #0c162e);
    min-height:100vh;
    padding:15px;
}

.container{
    max-width:500px;
    margin:auto;
    background:linear-gradient(135deg, #2563eb, #371237);
    color:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 8px 25px rgba(0,0,0,0.25);
}

    .header{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    margin-bottom:20px;
}

.logo{
    width:50px;
    height:50px;
    object-fit:contain;
}

.header h1{
    margin:0;
    font-size:24px;
}

@media (max-width:480px){
    .logo{
        width:40px;
        height:40px;
    }

    .header h1{
        font-size:20px;
    }
}
    
.logo-container{
    text-align:center;
    margin-bottom:15px;
}

.logo{
    width:120px;
    max-width:80%;
    height:auto;
}
    
h1{
    text-align:center;
    margin-bottom:20px;
    font-size:24px;
}

.input-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    font-size:16px;
    border:none;
    border-radius:8px;
    outline:none;
}

.result-card{
    margin-top:20px;
    padding:15px;
    background:#0c162e;
    border-radius:10px;
}

.result{
    font-size:20px;
    font-weight:bold;
    margin:12px 0;
    color:white;
}

#resinResult,
#saltResult{
    color:#FFD700;
    font-size:24px;
}

.footer{
    margin-top:15px;
    font-size:12px;
    color:#cccccc;
    text-align:center;
}

@media (max-width:480px){
    h1{
        font-size:20px;
    }

    .result{
        font-size:18px;
    }

    #resinResult,
    #saltResult{
        font-size:22px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <img src="logo.png" alt="Logo" class="logo">
        <h1>Water Softener Calculator</h1>
    </div>

    <div class="input-group">
        <label for="initialHardness">Initial Hardness (PPM)</label>
        <input type="number" inputmode="decimal" id="initialHardness" placeholder="Enter Initial Hardness">
    </div>

    <div class="input-group">
        <label for="finalHardness">Final Hardness (PPM)</label>
        <input type="number" inputmode="decimal" id="finalHardness" placeholder="Enter Final Hardness">
    </div>

    <div class="input-group">
        <label for="flowRate">Water Flow Rate (LPH)</label>
        <input type="number" inputmode="decimal" id="flowRate" placeholder="Enter Flow Rate">
    </div>

    <div class="input-group">
        <label for="regenTime">Service Time (Hours)</label>
        <input type="number" inputmode="decimal" id="regenTime" placeholder="Enter Service Time">
    </div>

<div class="input-group">
    <label for="regenPeriod">Regeneration Period (Days)</label>
    <input type="number"
           inputmode="decimal"
           id="regenPeriod"
           value="1"
           placeholder="Enter Regeneration Period">
</div>

    <div class="result-card">

        <div class="result">
            Resin Required:
            <span id="resinResult">0.00</span> Litre
        </div>

        <div class="result">
            Salt Required:
            <span id="saltResult">0.00</span> kg per regeneration
        </div>

    </div>

    <div class="footer">
        Results update automatically as values are entered.
    </div>

</div>

<script>

function calculate() {

    var initialHardness = parseFloat(document.getElementById("initialHardness").value) || 0;
    var finalHardness = parseFloat(document.getElementById("finalHardness").value) || 0;
    var flowRate = parseFloat(document.getElementById("flowRate").value) || 0;
    var regenTime = parseFloat(document.getElementById("regenTime").value) || 0;
    var regenPeriod = parseFloat(document.getElementById("regenPeriod").value) || 1;

    var resin =
        ((initialHardness - finalHardness) / 1000) *
        flowRate *
        regenTime *
        regenPeriod / 30;

    if (resin < 0) {
        resin = 0;
    }

    var salt = (resin * 150) / 1000;

    document.getElementById("resinResult").innerHTML = resin.toFixed(2);
    document.getElementById("saltResult").innerHTML = salt.toFixed(2);
}

window.onload = function() {

    document.getElementById("initialHardness").oninput = calculate;
    document.getElementById("finalHardness").oninput = calculate;
    document.getElementById("flowRate").oninput = calculate;
    document.getElementById("regenTime").oninput = calculate;
    document.getElementById("regenPeriod").oninput = calculate;

    calculate();
};

</script>

</body>
</html>
